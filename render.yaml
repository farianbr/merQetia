# Render Blueprint — backend API (Docker) + frontend (static site).
# Fill in the secret env vars in the Render dashboard after the first deploy.
services:
  # ── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: merqetia-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter            # PDF generation (Chromium) needs more than the free tier's RAM
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Chromium is baked into the image (see backend/Dockerfile)
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      # --- Secrets: set these in the dashboard (sync:false keeps them out of git) ---
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: INVITE_TOKEN_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false        # e.g. https://merqetia.onrender.com
      - key: APP_URL
        sync: false        # frontend URL, used in invite/email links
      # Mail
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      # AI summary
      - key: AI_KEY
        sync: false
      - key: AI_URL
        value: https://api.openai.com/v1
      - key: AI_MODEL
        value: gpt-4o-mini
      - key: AI_SUMMARY_ENABLED
        value: "true"
      # Cloudflare R2 file storage (private attachments + public avatars)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET            # private bucket (attachments)
        sync: false
      - key: R2_PUBLIC_BUCKET     # public bucket (avatars)
        sync: false
      - key: R2_PUBLIC_URL        # public base URL of the avatar bucket
        sync: false
      # Google Calendar OAuth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false

  # ── Frontend (Vite static site) ──────────────────────────────────────────
  - type: web
    name: merqetia-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false        # e.g. https://merqetia-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
